<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>Baglanti Yok - PanoVeri</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.25rem;
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 20px 60px rgb(15 23 42 / 0.12);
        padding: 1.25rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 1rem;
        font-weight: 800;
      }

      .mark {
        width: 2.3rem;
        height: 2.3rem;
        display: grid;
        place-items: center;
        border-radius: 10px;
        background: #eff6ff;
        color: #2563eb;
      }

      h1 {
        margin: 0 0 0.45rem;
        font-size: clamp(1.35rem, 5vw, 1.8rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #475569;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      button {
        width: 100%;
        min-height: 2.75rem;
        margin-top: 1.1rem;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid #bfdbfe;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <span class="mark" aria-hidden="true">⚡</span>
        <span>PanoVeri</span>
      </div>
      <h1>Internet baglantisi yok</h1>
      <p>
        Bu sayfa icin baglanti gerekiyor. Baglantinizi kontrol edip tekrar deneyin.
      </p>
      <button type="button" onclick="window.location.reload()">Tekrar Dene</button>
    </main>
  </body>
</html>
